<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070a13"/>
      <stop offset="100%" stop-color="#0c1220"/>
    </linearGradient>
  </defs>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&amp;family=Orbitron:wght@700&amp;display=swap');
    
    .card-bg { fill: url(#bg); stroke: #9D4EDD; stroke-opacity: 0.25; stroke-width: 1.5; rx: 8px; }
    
    .title { font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 700; fill: #9D4EDD; letter-spacing: 1px; }
    .tagline { font-family: 'Space Grotesk', sans-serif; font-size: 10px; fill: #94a3b8; }
    .label { font-family: 'Space Grotesk', sans-serif; font-size: 9px; fill: #64748b; }
    .badge { font-family: monospace; font-size: 9px; font-weight: bold; fill: #9D4EDD; }
    
    @keyframes pulse-node {
      0%, 100% { r: 3px; fill-opacity: 0.3; }
      50% { r: 5px; fill-opacity: 1; filter: url(#glow); }
    }
    
    @keyframes pulse-wave {
      0%, 100% { stroke-dashoffset: 0; }
      50% { stroke-dashoffset: -20; }
    }
    
    .node-act { animation: pulse-node 3s infinite; fill: #9D4EDD; }
    .wave-act { stroke: #9D4EDD; stroke-width: 1.5; stroke-dasharray: 4 4; animation: pulse-wave 2s linear infinite; }
  </style>

  <rect width="320" height="160" class="card-bg"/>
  
  <!-- Left Side content -->
  <g transform="translate(20, 25)">
    <!-- Category Icon/Tag -->
    <rect width="65" height="15" rx="3" fill="#1e1b4b" opacity="0.8"/>
    <text x="7" y="11" font-family="monospace" font-size="8" font-weight="bold" fill="#c084fc">3D_VISION</text>
    
    <text x="0" y="32" class="title">NEUROPRISM</text>
    
    <text x="0" y="47" class="tagline">fMRI-grade 3D brain feed</text>
    <text x="0" y="59" class="tagline">synced with video &amp; AI analysis</text>
    
    <text x="0" y="85" class="label">TECH STACK:</text>
    <g transform="translate(0, 95)">
      <rect width="68" height="16" rx="3" fill="#1e293b" opacity="0.6"/>
      <text x="6" y="11" class="badge">TypeScript</text>
      
      <rect x="73" y="0" width="50" height="16" rx="3" fill="#1e293b" opacity="0.6"/>
      <text x="79" y="11" class="badge">React</text>
      
      <rect x="0" y="21" width="55" height="16" rx="3" fill="#1e293b" opacity="0.6"/>
      <text x="6" y="11" class="badge">Three.js</text>
      
      <rect x="60" y="21" width="55" height="16" rx="3" fill="#1e293b" opacity="0.6"/>
      <text x="66" y="11" class="badge">Gemini</text>
    </g>
  </g>

  <!-- Right Side Visual element (x=210 to 300) -->
  <g transform="translate(225, 80)">
    <!-- Small Brain outline representation -->
    <path d="M -30,-40 C -10,-55 20,-55 35,-35 C 50,-15 50,15 35,30 C 20,40 -10,35 -20,20 C -30,20 -40,10 -40,-10 C -40,-30 -45,-30 -30,-40 Z" fill="none" stroke="#1e293b" stroke-width="1"/>
    
    <!-- Pulse Wave -->
    <path d="M -30,-40 C -10,-55 20,-55 35,-35" fill="none" class="wave-act"/>
    <path d="M 35,30 C 20,40 -10,35 -20,20" fill="none" class="wave-act" style="animation-delay: -1s; stroke-color: #00F5D4;"/>
    
    <!-- Nodes -->
    <circle cx="-10" cy="-45" class="node-act"/>
    <circle cx="25" cy="-25" class="node-act" style="animation-delay: -1s;"/>
    <circle cx="35" cy="5" class="node-act" style="animation-delay: -2s;"/>
    <circle cx="5" cy="25" class="node-act" style="animation-delay: -0.5s;"/>
    <circle cx="-25" cy="0" class="node-act" style="animation-delay: -1.5s;"/>
  </g>
</svg>
