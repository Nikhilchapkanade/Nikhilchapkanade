<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00F2FE" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#090d16" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F2FE"/>
      <stop offset="50%" stop-color="#9D4EDD"/>
      <stop offset="100%" stop-color="#00F5D4"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#9D4EDD" stop-opacity="0.2"/>
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="subtleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&amp;family=Orbitron:wght@700;900&amp;display=swap');
    
    .bg { fill: #030712; }
    .grid { fill: none; stroke: #1e293b; stroke-width: 0.5; opacity: 0.15; }
    
    .title {
      font-family: 'Orbitron', 'Space Grotesk', system-ui, -apple-system, sans-serif;
      font-weight: 900;
      font-size: 42px;
      fill: url(#textGrad);
      letter-spacing: 2px;
    }
    
    .subtitle {
      font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
      font-weight: 700;
      font-size: 18px;
      fill: #e2e8f0;
      letter-spacing: 1px;
    }
    
    .tagline {
      font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
      font-size: 13px;
      fill: #64748b;
      letter-spacing: 3px;
    }
    
    /* Animation keyframes */
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.4; }
      50% { transform: scale(1.15); opacity: 1; filter: drop-shadow(0 0 8px #00F2FE); }
    }
    
    @keyframes pulse-purple {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.15); opacity: 0.9; filter: drop-shadow(0 0 8px #9D4EDD); }
    }
    
    @keyframes dash {
      to {
        stroke-dashoffset: -40;
      }
    }
    
    @keyframes scanline {
      0% { transform: translateY(0); }
      100% { transform: translateY(320px); }
    }
    
    .node-c {
      animation: pulse 4s ease-in-out infinite;
      transform-origin: center;
    }
    .node-p {
      animation: pulse-purple 5s ease-in-out infinite;
      transform-origin: center;
    }
    
    .edge-active {
      stroke-dasharray: 8 12;
      animation: dash 2s linear infinite;
    }
    
    .scan {
      stroke: #00F2FE;
      stroke-width: 0.5;
      opacity: 0.03;
      animation: scanline 8s linear infinite;
    }
  </style>
  
  <!-- Background -->
  <rect class="bg" width="1000" height="320"/>
  
  <!-- Glowing Background Orbs -->
  <circle cx="200" cy="160" r="250" fill="url(#glow)"/>
  <circle cx="800" cy="160" r="280" fill="url(#glow)"/>
  
  <!-- Grid -->
  <path class="grid" d="M 0,40 L 1000,40 M 0,80 L 1000,80 M 0,120 L 1000,120 M 0,160 L 1000,160 M 0,200 L 1000,200 M 0,240 L 1000,240 M 0,280 L 1000,280 M 100,0 L 100,320 M 200,0 L 200,320 M 300,0 L 300,320 M 400,0 L 400,320 M 500,0 L 500,320 M 600,0 L 600,320 M 700,0 L 700,320 M 800,0 L 800,320 M 900,0 L 900,320" />
  
  <!-- Scanline -->
  <line class="scan" x1="0" y1="0" x2="1000" y2="0" />
  
  <!-- Code Dashboard Decors -->
  <g opacity="0.3" transform="translate(40, 40)">
    <rect x="0" y="0" width="12" height="12" fill="none" stroke="#00F2FE" stroke-width="1.5"/>
    <line x1="6" y1="0" x2="6" y2="12" stroke="#00F2FE" stroke-width="0.5"/>
    <line x1="0" y1="6" x2="12" y2="6" stroke="#00F2FE" stroke-width="0.5"/>
    <text x="20" y="10" font-family="monospace" font-size="8" fill="#00F2FE">SYS.INIT // OK</text>
  </g>
  <g opacity="0.2" transform="translate(40, 260)">
    <text x="0" y="10" font-family="monospace" font-size="9" fill="#9D4EDD">LATENCY: 14ms</text>
    <text x="0" y="22" font-family="monospace" font-size="9" fill="#00F5D4">PACKETS: 100%</text>
  </g>
  
  <!-- Left Side: Title and Typography -->
  <g transform="translate(70, 115)">
    <!-- Tech Tag -->
    <rect x="0" y="-45" width="135" height="20" rx="4" fill="#1e293b" opacity="0.6"/>
    <text x="10" y="-31" font-family="monospace" font-size="10" font-weight="bold" fill="#00F5D4">NODE_STATUS: ACTIVE</text>
    
    <text class="title" x="0" y="15" filter="url(#neonGlow)">NIKHIL CHAPKANADE</text>
    <text class="subtitle" x="0" y="52">AI Engineer • Building Autonomous Systems</text>
    <text class="tagline" x="0" y="85">AGENTIC AI • REINFORCEMENT LEARNING • COMPUTATIONAL NEUROSCIENCE</text>
  </g>
  
  <!-- Right Side: Neural Network Graph (Centered around 800, 160) -->
  <g transform="translate(0, 0)">
    <!-- Connections (Edges) -->
    <!-- Background passive lines -->
    <path d="M 720,160 L 800,80 L 880,110 L 880,210 L 800,240 L 720,160 Z" fill="none" stroke="#1e293b" stroke-width="1.5" />
    <path d="M 720,160 L 780,160 L 850,160 L 880,110" fill="none" stroke="#1e293b" stroke-width="1" />
    <path d="M 800,80 L 780,160 L 800,240" fill="none" stroke="#1e293b" stroke-width="1" />
    <path d="M 800,80 L 850,160 L 800,240" fill="none" stroke="#1e293b" stroke-width="1" />
    <path d="M 880,210 L 850,160" fill="none" stroke="#1e293b" stroke-width="1" />
    
    <!-- Active animated pulse lines -->
    <path class="edge-active" d="M 720,160 L 800,80 L 880,110" fill="none" stroke="#00F2FE" stroke-width="2" filter="url(#subtleGlow)"/>
    <path class="edge-active" d="M 720,160 L 780,160 L 850,160 L 880,210" fill="none" stroke="#9D4EDD" stroke-width="2" filter="url(#subtleGlow)" style="animation-duration: 3s; animation-direction: reverse;"/>
    <path class="edge-active" d="M 800,240 L 850,160 L 800,80" fill="none" stroke="#00F5D4" stroke-width="1.5" filter="url(#subtleGlow)" style="animation-duration: 2.5s;"/>
    <path class="edge-active" d="M 800,240 L 720,160" fill="none" stroke="#00F2FE" stroke-width="1.5" filter="url(#subtleGlow)" style="animation-duration: 4s;"/>

    <!-- Synaptic Nodes -->
    <!-- N1 (Cyan) -->
    <g transform="translate(720, 160)">
      <circle r="12" fill="#00F2FE" opacity="0.15" class="node-c"/>
      <circle r="6" fill="#00F2FE" filter="url(#subtleGlow)"/>
      <circle r="2" fill="#fff"/>
    </g>
    <!-- N2 (Purple) -->
    <g transform="translate(800, 80)">
      <circle r="12" fill="#9D4EDD" opacity="0.15" class="node-p" style="animation-delay: -1s;"/>
      <circle r="6" fill="#9D4EDD" filter="url(#subtleGlow)"/>
      <circle r="2" fill="#fff"/>
    </g>
    <!-- N3 (Teal) -->
    <g transform="translate(880, 110)">
      <circle r="10" fill="#00F5D4" opacity="0.15" class="node-c" style="animation-delay: -2s;"/>
      <circle r="5" fill="#00F5D4" filter="url(#subtleGlow)"/>
      <circle r="1.5" fill="#fff"/>
    </g>
    <!-- N4 (Purple) -->
    <g transform="translate(880, 210)">
      <circle r="10" fill="#9D4EDD" opacity="0.15" class="node-p" style="animation-delay: -0.5s;"/>
      <circle r="5" fill="#9D4EDD" filter="url(#subtleGlow)"/>
      <circle r="1.5" fill="#fff"/>
    </g>
    <!-- N5 (Cyan) -->
    <g transform="translate(800, 240)">
      <circle r="12" fill="#00F2FE" opacity="0.15" class="node-c" style="animation-delay: -1.5s;"/>
      <circle r="6" fill="#00F2FE" filter="url(#subtleGlow)"/>
      <circle r="2" fill="#fff"/>
    </g>
    <!-- N6 (Teal) -->
    <g transform="translate(780, 160)">
      <circle r="8" fill="#00F5D4" opacity="0.15" class="node-c" style="animation-delay: -3s;"/>
      <circle r="4" fill="#00F5D4" filter="url(#subtleGlow)"/>
    </g>
    <!-- N7 (Purple) -->
    <g transform="translate(850, 160)">
      <circle r="8" fill="#9D4EDD" opacity="0.15" class="node-p" style="animation-delay: -2.5s;"/>
      <circle r="4" fill="#9D4EDD" filter="url(#subtleGlow)"/>
    </g>
  </g>
  
  <!-- Outer glowing border -->
  <rect x="2" y="2" width="996" height="316" rx="8" fill="none" stroke="#1e293b" stroke-width="1" />
  <rect x="2" y="2" width="996" height="316" rx="8" fill="none" stroke="#00F2FE" stroke-width="1.5" opacity="0.2" filter="url(#subtleGlow)"/>
</svg>
