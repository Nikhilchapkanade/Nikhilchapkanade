<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070a13"/>
      <stop offset="100%" stop-color="#0c1220"/>
    </linearGradient>
  </defs>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&amp;family=Orbitron:wght@700&amp;display=swap');
    
    .card-bg { fill: url(#bg); stroke: #00F5D4; stroke-opacity: 0.25; stroke-width: 1.5; rx: 8px; }
    
    .title { font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 700; fill: #00F5D4; letter-spacing: 1px; }
    .tagline { font-family: 'Space Grotesk', sans-serif; font-size: 10px; fill: #94a3b8; }
    .label { font-family: 'Space Grotesk', sans-serif; font-size: 9px; fill: #64748b; }
    .badge { font-family: monospace; font-size: 9px; font-weight: bold; fill: #00F5D4; }
    
    @keyframes ping-pong {
      0% { cx: -25px; cy: -10px; }
      50% { cx: 25px; cy: 10px; }
      100% { cx: -25px; cy: -10px; }
    }
    
    @keyframes node-pulse {
      0%, 100% { fill: #00F5D4; fill-opacity: 0.4; }
      50% { fill: #9D4EDD; fill-opacity: 0.8; }
    }
    
    .packet { animation: ping-pong 3s ease-in-out infinite; fill: #00F5D4; filter: url(#glow); }
    .agent-node { animation: node-pulse 3s ease-in-out infinite; fill: #00F5D4; }
  </style>

  <rect width="320" height="160" class="card-bg"/>
  
  <!-- Left Side content -->
  <g transform="translate(20, 25)">
    <!-- Category Icon/Tag -->
    <rect width="75" height="15" rx="3" fill="#064e3b" opacity="0.8"/>
    <text x="7" y="11" font-family="monospace" font-size="8" font-weight="bold" fill="#34d399">AGENT_DEBATE</text>
    
    <text x="0" y="32" class="title">PAPER-PROVER</text>
    
    <text x="0" y="47" class="tagline">Adversarial Research Debater</text>
    <text x="0" y="59" class="tagline">Catches inflated claims &amp; bugs</text>
    
    <text x="0" y="85" class="label">TECH STACK:</text>
    <g transform="translate(0, 95)">
      <rect width="60" height="16" rx="3" fill="#1e293b" opacity="0.6"/>
      <text x="6" y="11" class="badge">JavaScript</text>
      
      <rect x="65" y="0" width="45" height="16" rx="3" fill="#1e293b" opacity="0.6"/>
      <text x="6" y="11" class="badge">HTML5</text>
      
      <rect x="115" y="0" width="40" height="16" rx="3" fill="#1e293b" opacity="0.6"/>
      <text x="6" y="11" class="badge">CSS3</text>
      
      <rect x="0" y="21" width="55" height="16" rx="3" fill="#1e293b" opacity="0.6"/>
      <text x="6" y="11" class="badge">LLM API</text>
    </g>
  </g>

  <!-- Right Side Visual element (Debate nodes) -->
  <g transform="translate(255, 80)">
    <!-- Connecting debate pathway -->
    <line x1="-25" y1="-10" x2="25" y2="10" stroke="#1e293b" stroke-width="2"/>
    <line x1="-25" y1="-10" x2="25" y2="10" stroke="#00F5D4" stroke-opacity="0.2" stroke-width="4"/>
    
    <!-- Agent A -->
    <g transform="translate(-25, -10)">
      <circle r="12" class="agent-node"/>
      <circle r="6" fill="#fff" opacity="0.9"/>
      <text x="-5" y="3" font-family="monospace" font-weight="bold" font-size="8" fill="#111827">A</text>
      <text x="-12" y="-16" font-family="monospace" font-size="8" fill="#94a3b8">Prover</text>
    </g>
    
    <!-- Agent B -->
    <g transform="translate(25, 10)">
      <circle r="12" class="agent-node" style="animation-delay: -1.5s;"/>
      <circle r="6" fill="#fff" opacity="0.9"/>
      <text x="-5" y="3" font-family="monospace" font-weight="bold" font-size="8" fill="#111827">B</text>
      <text x="-12" y="23" font-family="monospace" font-size="8" fill="#94a3b8">Skeptic</text>
    </g>
    
    <!-- Flying debate claim packet -->
    <circle r="4" class="packet"/>
  </g>
</svg>
