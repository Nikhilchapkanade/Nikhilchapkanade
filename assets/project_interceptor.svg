<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070a13"/>
      <stop offset="100%" stop-color="#0c1220"/>
    </linearGradient>
  </defs>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&amp;family=Orbitron:wght@700&amp;display=swap');
    
    .card-bg { fill: url(#bg); stroke: #00F2FE; stroke-opacity: 0.25; stroke-width: 1.5; rx: 8px; }
    
    .title { font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 700; fill: #00F2FE; letter-spacing: 1px; }
    .tagline { font-family: 'Space Grotesk', sans-serif; font-size: 10px; fill: #94a3b8; }
    .label { font-family: 'Space Grotesk', sans-serif; font-size: 9px; fill: #64748b; }
    .badge { font-family: monospace; font-size: 9px; font-weight: bold; fill: #00F2FE; }
    
    @keyframes radar-sweep {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    @keyframes blip {
      0%, 70%, 100% { opacity: 0.2; r: 2px; }
      30% { opacity: 1; r: 4px; fill: #ef4444; filter: url(#glow); }
    }
    
    .sweep { transform-origin: 0px 0px; animation: radar-sweep 4s linear infinite; stroke: #00F2FE; stroke-width: 1.2; opacity: 0.6; }
    .blip-node { animation: blip 4s ease-out infinite; fill: #ef4444; }
  </style>

  <rect width="320" height="160" class="card-bg"/>
  
  <!-- Left Side content -->
  <g transform="translate(20, 25)">
    <!-- Category Icon/Tag -->
    <rect width="70" height="15" rx="3" fill="#042f2e" opacity="0.8"/>
    <text x="7" y="11" font-family="monospace" font-size="8" font-weight="bold" fill="#2dd4bf">RL_SWARM</text>
    
    <text x="0" y="32" class="title">INTERCEPTOR</text>
    
    <text x="0" y="47" class="tagline">5-layer Autonomous Swarm Defense</text>
    <text x="0" y="59" class="tagline">RL controller with Kafka streaming</text>
    
    <text x="0" y="85" class="label">TECH STACK:</text>
    <g transform="translate(0, 95)">
      <rect width="55" height="16" rx="3" fill="#1e293b" opacity="0.6"/>
      <text x="6" y="11" class="badge">PyTorch</text>
      
      <rect x="60" y="0" width="48" height="16" rx="3" fill="#1e293b" opacity="0.6"/>
      <text x="6" y="11" class="badge">Kafka</text>
      
      <rect x="113" y="0" width="45" height="16" rx="3" fill="#1e293b" opacity="0.6"/>
      <text x="6" y="11" class="badge">Gym</text>
      
      <rect x="0" y="21" width="65" height="16" rx="3" fill="#1e293b" opacity="0.6"/>
      <text x="6" y="11" class="badge">LangGraph</text>
    </g>
  </g>

  <!-- Right Side Visual Radar element (x=225, y=80) -->
  <g transform="translate(255, 80)">
    <!-- Radar outer circles -->
    <circle r="40" fill="none" stroke="#1e293b" stroke-width="0.8"/>
    <circle r="25" fill="none" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="2 2"/>
    <circle r="10" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    
    <!-- Crosshairs -->
    <line x1="-45" y1="0" x2="45" y2="0" stroke="#1e293b" stroke-width="0.5"/>
    <line x1="0" y1="-45" x2="0" y2="45" stroke="#1e293b" stroke-width="0.5"/>
    
    <!-- Sweep line -->
    <line x1="0" y1="0" x2="0" y2="-40" class="sweep"/>
    <path d="M 0,0 L 20,-34.6 A 40,40 0 0,0 0,-40 Z" fill="#00F2FE" fill-opacity="0.08" transform="rotate(-30)" transform-origin="0px 0px" pointer-events="none"/>
    
    <!-- Blip targets (Drones) -->
    <circle cx="-15" cy="-22" class="blip-node" style="animation-delay: 1s;"/>
    <circle cx="22" cy="-10" class="blip-node" style="animation-delay: 2.2s;"/>
    <circle cx="10" cy="25" class="blip-node" style="animation-delay: 3.5s;"/>
    <circle cx="-25" cy="15" class="blip-node" style="animation-delay: 0.2s;"/>
  </g>
</svg>
