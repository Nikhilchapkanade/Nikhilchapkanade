<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="100%" height="100%">
  <defs>
    <!-- Glow Filters -->
    <filter id="glow-violet" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-cyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-teal" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-pink" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060913"/>
      <stop offset="100%" stop-color="#0b101d"/>
    </linearGradient>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&amp;family=Orbitron:wght@700&amp;display=swap');
    
    .card-bg { fill: url(#cardGrad); stroke: #1e293b; stroke-width: 1.5; rx: 8px; }
    
    /* Typography */
    .title { font-family: 'Orbitron', sans-serif; font-size: 13px; fill: #9D4EDD; letter-spacing: 2px; }
    .subtitle { font-family: 'Space Grotesk', sans-serif; font-size: 10px; fill: #64748b; letter-spacing: 1px; }
    .label { font-family: 'Space Grotesk', sans-serif; font-size: 11px; fill: #94a3b8; }
    .value { font-family: monospace; font-size: 12px; font-weight: bold; }
    
    /* Base mesh styles */
    .mesh-line { stroke-width: 0.8; opacity: 0.15; transition: stroke 0.3s, opacity 0.3s; fill: none; }
    .mesh-node { r: 3px; fill-opacity: 0.3; transition: fill-opacity 0.3s, filter 0.3s; }
    
    /* Neural Wave Keyframes */
    @keyframes occipital-glow {
      0%, 80%, 100% { stroke: #1e293b; stroke-width: 0.8; opacity: 0.15; }
      10%, 30% { stroke: #00F5D4; stroke-width: 1.5; opacity: 0.85; filter: url(#glow-teal); }
    }
    @keyframes occipital-node-glow {
      0%, 80%, 100% { fill: #475569; fill-opacity: 0.3; filter: none; r: 3px; }
      10%, 30% { fill: #00F5D4; fill-opacity: 1; filter: url(#glow-teal); r: 4.5px; }
    }
    
    @keyframes temporal-glow {
      0%, 20%, 90%, 100% { stroke: #1e293b; stroke-width: 0.8; opacity: 0.15; }
      30%, 50% { stroke: #ff007f; stroke-width: 1.5; opacity: 0.85; filter: url(#glow-pink); }
    }
    @keyframes temporal-node-glow {
      0%, 20%, 90%, 100% { fill: #475569; fill-opacity: 0.3; filter: none; r: 3px; }
      30%, 50% { fill: #ff007f; fill-opacity: 1; filter: url(#glow-pink); r: 4.5px; }
    }
    
    @keyframes parietal-glow {
      0%, 40%, 100% { stroke: #1e293b; stroke-width: 0.8; opacity: 0.15; }
      50%, 70% { stroke: #00F2FE; stroke-width: 1.5; opacity: 0.85; filter: url(#glow-cyan); }
    }
    @keyframes parietal-node-glow {
      0%, 40%, 100% { fill: #475569; fill-opacity: 0.3; filter: none; r: 3px; }
      50%, 70% { fill: #00F2FE; fill-opacity: 1; filter: url(#glow-cyan); r: 4.5px; }
    }
    
    @keyframes frontal-glow {
      0%, 60% { stroke: #1e293b; stroke-width: 0.8; opacity: 0.15; }
      70%, 90% { stroke: #9D4EDD; stroke-width: 1.5; opacity: 0.85; filter: url(#glow-violet); }
      100% { stroke: #1e293b; opacity: 0.15; }
    }
    @keyframes frontal-node-glow {
      0%, 60% { fill: #475569; fill-opacity: 0.3; filter: none; r: 3px; }
      70%, 90% { fill: #9D4EDD; fill-opacity: 1; filter: url(#glow-violet); r: 5px; }
      100% { fill: #475569; fill-opacity: 0.3; }
    }
    
    /* Dynamic UI text animations */
    @keyframes text-occipital {
      0%, 10%, 30%, 100% { opacity: 0.2; }
      15%, 25% { opacity: 1; }
    }
    @keyframes text-frontal {
      0%, 70%, 90%, 100% { opacity: 0.2; }
      75%, 85% { opacity: 1; }
    }
    
    .occ-line { animation: occipital-glow 6s infinite; }
    .occ-node { animation: occipital-node-glow 6s infinite; }
    
    .temp-line { animation: temporal-glow 6s infinite; }
    .temp-node { animation: temporal-node-glow 6s infinite; }
    
    .par-line { animation: parietal-glow 6s infinite; }
    .par-node { animation: parietal-node-glow 6s infinite; }
    
    .fr-line { animation: frontal-glow 6s infinite; }
    .fr-node { animation: frontal-node-glow 6s infinite; }
    
    .occ-ui { animation: text-occipital 6s infinite; fill: #00F5D4; }
    .fr-ui { animation: text-frontal 6s infinite; fill: #9D4EDD; }
  </style>

  <!-- Background -->
  <rect width="500" height="300" class="card-bg"/>

  <!-- LEFT PANEL: Stats & Metrics -->
  <g transform="translate(30, 40)">
    <text class="title" x="0" y="15">NEURO_PRISM</text>
    <text class="subtitle" x="0" y="30">3D fMRI DECODING ENGINE</text>
    
    <line x1="0" y1="45" x2="170" y2="45" stroke="#1e293b" stroke-width="1"/>
    
    <text class="label" x="0" y="70">SYS_FPS:</text>
    <text class="value" x="110" y="70" fill="#e2e8f0">60.0 FPS</text>
    
    <text class="label" x="0" y="95">COGNITIVE_MODEL:</text>
    <text class="value" x="110" y="95" fill="#e2e8f0">TRIBEv2 + ViT</text>
    
    <text class="label" x="0" y="120">RESOLVER:</text>
    <text class="value" x="110" y="120" fill="#e2e8f0">fMRI-to-3D</text>

    <!-- Signal trace dashboard -->
    <rect x="0" y="145" width="170" height="95" rx="4" fill="#04060b" stroke="#1e293b" stroke-width="1"/>
    
    <text x="10" y="165" font-family="monospace" font-size="9" fill="#64748b">SIGNAL PROPAGATION:</text>
    
    <g transform="translate(10, 180)">
      <!-- Occipital UI node -->
      <circle cx="10" cy="5" r="3" class="occ-ui" />
      <text x="20" y="8" font-family="monospace" font-size="9" class="occ-ui">VISUAL CORTEX (Teal)</text>
      
      <!-- Frontal UI node -->
      <circle cx="10" cy="25" r="3" class="fr-ui" />
      <text x="20" y="28" font-family="monospace" font-size="9" class="fr-ui">PREFRONTAL (Violet)</text>
      
      <!-- System Decoder -->
      <text x="0" y="48" font-family="monospace" font-size="9" fill="#64748b">DECODER: <tspan fill="#00F2FE">ACTIVE</tspan></text>
    </g>
  </g>

  <!-- Vertical Divider -->
  <line x1="220" y1="30" x2="220" y2="270" stroke="#1e293b" stroke-width="1"/>

  <!-- RIGHT PANEL: Brain wireframe network -->
  <g transform="translate(0, 0)">
    <!-- Defining connection paths between lobes -->
    <!-- Nodes coordinate list:
         F1: 290, 110 | F2: 275, 140 | F3: 295, 175 | F4: 325, 145 | F5: 315, 100
         P1: 355, 80  | P2: 395, 90  | P3: 355, 120 | P4: 405, 130
         O1: 435, 120 | O2: 445, 150 | O3: 425, 180 | O4: 395, 160
         T1: 335, 180 | T2: 365, 200 | T3: 345, 150
         C1: 405, 210 | C2: 425, 220 | C3: 385, 220
         B1: 355, 230 | B2: 355, 260
    -->

    <!-- Occipital Lobe Lines (Teal) -->
    <line x1="435" y1="120" x2="445" y2="150" class="mesh-line occ-line"/>
    <line x1="445" y1="150" x2="425" y2="180" class="mesh-line occ-line"/>
    <line x1="425" y1="180" x2="395" y2="160" class="mesh-line occ-line"/>
    <line x1="395" y1="160" x2="435" y2="120" class="mesh-line occ-line"/>
    <line x1="405" y1="130" x2="435" y2="120" class="mesh-line occ-line"/>
    <line x1="405" y1="130" x2="395" y2="160" class="mesh-line occ-line"/>
    
    <!-- Temporal Lobe Lines (Pink) -->
    <line x1="335" y1="180" x2="365" y2="200" class="mesh-line temp-line"/>
    <line x1="365" y1="200" x2="345" y2="150" class="mesh-line temp-line"/>
    <line x1="345" y1="150" x2="335" y2="180" class="mesh-line temp-line"/>
    <line x1="295" y1="175" x2="335" y2="180" class="mesh-line temp-line"/>
    <line x1="345" y1="150" x2="325" y2="145" class="mesh-line temp-line"/>
    <line x1="365" y1="200" x2="385" y2="220" class="mesh-line temp-line"/>

    <!-- Parietal Lobe Lines (Cyan) -->
    <line x1="355" y1="80" x2="395" y2="90" class="mesh-line par-line"/>
    <line x1="395" y1="90" x2="405" y2="130" class="mesh-line par-line"/>
    <line x1="405" y1="130" x2="355" y2="120" class="mesh-line par-line"/>
    <line x1="355" y1="120" x2="355" y2="80" class="mesh-line par-line"/>
    <line x1="315" y1="100" x2="355" y2="80" class="mesh-line par-line"/>
    <line x1="355" y1="120" x2="325" y2="145" class="mesh-line par-line"/>
    
    <!-- Frontal Lobe Lines (Violet) -->
    <line x1="290" y1="110" x2="275" y2="140" class="mesh-line fr-line"/>
    <line x1="275" y1="140" x2="295" y2="175" class="mesh-line fr-line"/>
    <line x1="295" y1="175" x2="325" y2="145" class="mesh-line fr-line"/>
    <line x1="325" y1="145" x2="315" y2="100" class="mesh-line fr-line"/>
    <line x1="315" y1="100" x2="290" y2="110" class="mesh-line fr-line"/>
    <line x1="290" y1="110" x2="325" y2="145" class="mesh-line fr-line"/>
    <line x1="275" y1="140" x2="325" y2="145" class="mesh-line fr-line"/>

    <!-- Cerebellum / Stem / Background Lines (Passive) -->
    <line x1="405" y1="210" x2="425" y2="220" stroke="#1e293b" stroke-width="0.8" opacity="0.4"/>
    <line x1="425" y1="220" x2="385" y2="220" stroke="#1e293b" stroke-width="0.8" opacity="0.4"/>
    <line x1="385" y1="220" x2="405" y2="210" stroke="#1e293b" stroke-width="0.8" opacity="0.4"/>
    <line x1="425" y1="180" x2="405" y2="210" stroke="#1e293b" stroke-width="0.8" opacity="0.4"/>
    <line x1="355" y1="230" x2="355" y2="260" stroke="#1e293b" stroke-width="1.2" opacity="0.5"/>
    <line x1="365" y1="200" x2="355" y2="230" stroke="#1e293b" stroke-width="0.8" opacity="0.4"/>
    <line x1="385" y1="220" x2="355" y2="230" stroke="#1e293b" stroke-width="0.8" opacity="0.4"/>
    
    <!-- Lobe connecting bundle lines (inter-lobe transmission pathways) -->
    <!-- Frontal to Parietal -->
    <line x1="315" y1="100" x2="355" y2="120" stroke="#4f46e5" stroke-dasharray="2 2" stroke-width="0.8" opacity="0.3"/>
    <!-- Temporal to Occipital -->
    <line x1="345" y1="150" x2="395" y2="160" stroke="#4f46e5" stroke-dasharray="2 2" stroke-width="0.8" opacity="0.3"/>
    <!-- Parietal to Occipital -->
    <line x1="395" y1="90" x2="435" y2="120" stroke="#4f46e5" stroke-dasharray="2 2" stroke-width="0.8" opacity="0.3"/>

    <!-- Nodes (Pulsing circles at intersections) -->
    <!-- Occipital Nodes -->
    <circle cx="435" cy="120" class="occ-node"/>
    <circle cx="445" cy="150" class="occ-node"/>
    <circle cx="425" cy="180" class="occ-node"/>
    <circle cx="395" cy="160" class="occ-node"/>
    
    <!-- Temporal Nodes -->
    <circle cx="335" cy="180" class="temp-node"/>
    <circle cx="365" cy="200" class="temp-node"/>
    <circle cx="345" cy="150" class="temp-node"/>
    
    <!-- Parietal Nodes -->
    <circle cx="355" cy="80" class="par-node"/>
    <circle cx="395" cy="90" class="par-node"/>
    <circle cx="355" cy="120" class="par-node"/>
    <circle cx="405" cy="130" class="par-node"/>
    
    <!-- Frontal Nodes -->
    <circle cx="290" cy="110" class="fr-node"/>
    <circle cx="275" cy="140" class="fr-node"/>
    <circle cx="295" cy="175" class="fr-node"/>
    <circle cx="325" cy="145" class="fr-node"/>
    <circle cx="315" cy="100" class="fr-node"/>

    <!-- Passive structural Nodes -->
    <circle cx="405" cy="210" r="2.5" fill="#475569" opacity="0.4"/>
    <circle cx="425" cy="220" r="2.5" fill="#475569" opacity="0.4"/>
    <circle cx="385" cy="220" r="2.5" fill="#475569" opacity="0.4"/>
    <circle cx="355" cy="230" r="3" fill="#475569" opacity="0.5"/>
    <circle cx="355" cy="260" r="3.5" fill="#475569" opacity="0.6"/>
  </g>

  <!-- Glowing Border -->
  <rect x="2" y="2" width="496" height="296" rx="8" fill="none" stroke="#9D4EDD" stroke-width="1.5" opacity="0.1" filter="url(#glow-violet)"/>
</svg>
